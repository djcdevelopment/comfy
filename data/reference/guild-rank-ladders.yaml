# Guild rank ladders — ranks 1–3 for all 7 guilds
#
# Source: user-made flowcharts (hand-drawn by a member who later became a Guild Master),
# three images = rank tiers 1, 2, 3. Transcribed 2026-06-30. PROVISIONAL — verify against
# each guild's authoritative rank graphics in its Discord channel (which drift; guide line 149).
#
# Ladders continue beyond tier 3 (depth unknown). Requirements are Era-scoped (Era 16).
#
# MODEL: a GuildRank ladder = ordered list of TIERS. Each tier =
#   { rank name, ordered task `path`, optional reward bonus, material tribute }.
# Mechanics are wildly heterogeneous per guild (contracts / wholesale points / IRL badges /
# boss-kill challenges / LOTR-themed quests). A generic "GuildRank" entity must hold all shapes.
#
# Abbreviations seen: CS = community-service hours; AP = (Explorer) adventure points;
# IP = (Mage) points from boss-related "incantation" challenges; Tn = gear tier.

meta:
  era: 16
  captured: "2026-06-30"
  source: "3 user-made flowchart images (rank tiers 1/2/3)"
  status: provisional
  coverage: "ranks 1–3, all 7 guilds; ladders extend further (depth unknown)"

guilds:
  slayer:
    rank_theme: "Norse nobility (Thrall → Thegn → Jarl → …)"
    tiers:
      - tier: 1
        rank: Thrall
        path:
          - "Complete 5 contracts"
          - "Complete 5 general summons (Know your Enemies I & II, Intermediate Killer, Clash of Titans, Air Drop)"
          - "Kneel at HQ and request Viking Trainee"
      - tier: 2
        rank: Thegn
        path:
          - "Complete 9 Contracts + 2 Bounties"
          - "Complete 10 summons (Blacksmith I, Bonking Bonemass, Crusader, Fenrir's Children, Helpful Hunter)"
          - "Thrall Duel or Mercy Rule"
      - tier: 3
        rank: Jarl
        path:
          - "Complete 15 Contracts + 5 Bounties + 10 Class Summons"
          - "Class challenges: Death from Above, Full House, Swift Sneak, Self Sufficient, Silent Killer, Gjallarhorn Come, Back Stabber, Cold Shot, Falling Hard, Skilled Rogue"

  merchant:
    rank_theme: "Trade ladder (Peddler → Vendor → Exalted → …)"
    tiers:
      - tier: 1
        rank: Peddler
        bonus: "+2 Merchant Tokens"
        path:
          - "Document Comfort of 10"
          - "Earn 1 point Non-profit (The Giver) + 10 Points Wholesale (Birch Please, Baker, Butcher, Gourmand)"
          - "Make trades of token items for Merchants (15)"
      - tier: 2
        rank: Vendor
        path:
          - "Manufacturing (Armorer, Blacksmith, Shield Maiden) + Retail (Boom Boom Pow, Carpenter, Pet Shop) + Wholesale (Bird is the Word [Rangers], Fickle Thistle, Fun Gal)"
          - "Document a comfort level of 10 and make trades of token items for Merchants (45)"
      - tier: 3
        rank: Exalted
        path:
          - "4 Points Marketing (Diverse Clientele) + 10 Points Non-Profit (Strong Blessing, Benvolent Merchant, Forged in Fire) + 30 Points Wholesale (Ashen Adventurer, Black Glass, Bloodbagger, Green Thumb, I Can't Believe It's not Coal, Long Live the Queen, Misty Merchant, Seed Banking)"
          - "15 Comfort and make trades of token items for Merchants (35)"

  builder:
    rank_theme: "Building trades (Mason → Contractor → Architect → …)"
    tiers:
      - tier: 1
        rank: Mason
        path:
          - "Collect 5 Builder Points"
          - "Complete one Commission"
      - tier: 2
        rank: Contractor
        path:
          - "Collect 10 Builder Points"
          - "Participate in a Builder Event"
      - tier: 3
        rank: Architect
        path:
          - "Collect 15 Builder Points"
          - "Complete a Portfolio"

  ranger:
    rank_theme: "Field ranks (Scout → Trailblazer → Warden → …)"
    note: "Uniquely blends REAL-LIFE environmental activities (IRL badges, community-service hours) with in-game field events."
    tiers:
      - tier: 1
        rank: Scout
        bonus: "+1 Badge"
        path:
          - "Finish IRL badges before era start: Animal Care, Environmentalist, Meadow, Plains, Ocean"
          - "Look for chances to do: Fish out of Water, Neck Preserve, Room to Grow, Hunting Spirits, Camping"
      - tier: 2
        rank: Trailblazer
        path:
          - "Badges: Art, First Aid Kit, Dog Whisperer, Fishing Pier, Outpost"
          - "Badges: Herbalist, Lore Friendly, Pet Resort, Waterway, Photography"
          - "Collect 15 Badges + 1 Ranger Quest (Bee Who) + 3 CS Hours"
      - tier: 3
        rank: Warden
        path:
          - "Badges: Dog Whisperer, Camping, Comfy Ranger, Community Garden, Raised Garden"
          - "Badges: Theater Arts, Trailblazer, Waterway, Engineering, Foxy Loxy"
          - "Complete 25 Badges + 6 Hours CS"
          - "2 Quests (Bee Who and God Firs / Bee's Targets)"

  explorer:
    rank_theme: "Wayfarer ranks (Drifter → Wanderer → Strider → …)"
    tiers:
      - tier: 1
        rank: Drifter
        path:
          - "Find Tutorial Stash and make a T1 like it"
          - "Walk a starter continent coastline until you see an Explorer's Shipwreck"
          - "Bring 20 meat, 20 fruit, and 20 shrooms"
          - "Sail to Explorer HQ"
      - tier: 2
        rank: Wanderer
        path:
          - "Earn 25 AP and make a T2"
          - "Find 5 Coastal Shipwrecks"
          - "Item from Every Biome (8)"
          - "2x Coastlines (Old way, or ReportCard)"
      - tier: 3
        rank: Strider
        path:
          - "Earn 50 AP"
          - "Make a T3 (Skills)"
          - "Fully explore 2 continents + 5 Coastlines (ReportCard)"
          - "Participate in 3 races (incl. Pentathalon)"
          - "Exploration: 5 Ocean Spires"

  hobbit:
    rank_theme: "LOTR-themed wayfaring (Traveller → Harvester → Dweller → …)"
    tiers:
      - tier: 1
        rank: Traveller
        path:
          - "Themed quests: Hobbit Feast, Bilbo's Book, Fangorn Forest, Took's Tangle, Gandalf's Fireworks"
          - "Complete 5 quests"
      - tier: 2
        rank: Harvester
        path:
          - "Themed quests: Farmer Maggot, Comforts of Home, Shadows of Mordor, Hobbit Feast II, Bilbo's Book II"
      - tier: 3
        rank: Dweller
        path:
          - "Themed quests: Phial of Galadriel, Dark Magic, Comforts of Home II, Bilbo's Book III"

  mage:
    rank_theme: "Arcane ranks (Apprentice → Enchanter → Archmage → …)"
    tiers:
      - tier: 1
        rank: Apprentice
        path:
          - "Get someone to ferry you to Freyja's Isle with your offering"
          - "Complete Novice Arcane Arts (Pickables, Potions, Runestones)"
          - "Request and complete the Harrowing"
      - tier: 2
        rank: Enchanter
        path:
          - "Complete Advanced Arcane Arts (Pickables, Potions, Runestones)"
          - "Accumulate 25 IP — boss challenges (28 total): Eikthyr w/ Dundr & Dead Raiser; Elder w/ Fire Staff; Bonemass w/ Frost Staff; Moder w/ Fire Staff; Yagluth w/ Yag buff & Staff of the Wild; Queen w/ Eitr armor & Bombs; Fader w/ Embla & Staff of the Wild"
          - "Complete 'Here Lies the Abyss'"
      - tier: 3
        rank: Archmage
        path:
          - "Complete Arcane Arts (Pickables, Potions, Runestones) and Arcane Masteries (four '-mancy' quests)"
          - "Win a Mage Duel, accumulate 60 IP (ferry three players; provide foods and potions four times), and complete WPHW"

