enrichment:
  source: "Raevyxn's Era 16 master guild sheet (data/raw/discord-found-sheet.csv); each guild also
    links its own 'quests & rank tracker' — more data sources to absorb."
  initiation:            # some guilds gate entry
    slayer:   "Complete the Training Course at Slayer HQ (screenshot proof)"
    merchant: "none — make any transaction + submit a token in #token-turnin (or be tagged in one)"
    builder:  "none"
    ranger:   "none"
    explorer: "none"
    hobbit:   "Request from @HobbitRep in #hobbit-requests; ceremony at Hobbit HQ; receive ward access"
    mage:     "'Offering to Goddess Freyja' — 1 stack each Honey/Feathers/Ancient Bark + 1 each Hard
      Antler, Swamp Key, Wishbone, L1 Copper Knife (with crafting tag)"
  reward_dimension:      # the WHY you climb — the ladders had requirements, not the payoff
    note: "each rank grants rewards: private quarters, boss stones, 10x crafting/farming stations, achievements"
    slayer:   "personal fortress (expands w/ rank); 10x crafting: Smelter@Thrall, Blast Furnace@Thegn; boss stone@Jarl"
    merchant: "personal trade locker (many chests + 3 metal portals) @Exalted"
    builder:  "upgradeable Build Hammer (grows each era); boss stone@Architect (after 'The Journeyman's Endeavor')"
    ranger:   "treehouse@Scout; personal vault; boss stone@Warden (after 'The Prepared')"
    explorer: "personal vault@Nomad; boss stone@Pathfinder"
    hobbit:   "pre-fab Hobbit home (Comfort 25)@Dweller; 10x crafting@Harvester; boss stone@Dweller (after 'Ring Bearer')"
    mage:     "study room + mead kettle@Initiation; boss stone@Archmage (after 'Runemaster'); Mage Garden (after 'Elementalist')"
  additional_ranks_seen: # beyond the 3 tiers captured earlier → ladders extend to ~5-6 tiers
    explorer: ["Nomad", "Pathfinder"]
  achievements_seen: ["The Journeyman's Endeavor (Builder)", "The Prepared (Ranger)",
    "Ring Bearer (Hobbit)", "Runemaster (Mage)", "Elementalist (Mage)"]
