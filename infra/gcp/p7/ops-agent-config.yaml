logging:
  receivers:
    docker:
      type: files
      include_paths:
        - /var/lib/docker/containers/*/*-json.log
      record_log_file_path: true
  processors:
    parse_docker:
      type: parse_json
      field: message
      time_key: time
      time_format: "%Y-%m-%dT%H:%M:%S.%LZ"
    parse_application:
      type: parse_json
      field: log
  service:
    pipelines:
      docker:
        receivers: [docker]
        processors: [parse_docker, parse_application]

combined:
  receivers:
    otlp:
      type: otlp
      grpc_endpoint: 0.0.0.0:4317
      metrics_mode: googlecloudmonitoring

metrics:
  receivers:
    hostmetrics:
      type: hostmetrics
      collection_interval: 30s
  service:
    pipelines:
      otlp:
        receivers: [otlp]

traces:
  service:
    pipelines:
      otlp:
        receivers: [otlp]
