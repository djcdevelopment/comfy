<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">Comfy and Lumberjacks hardware and technology topology</title>
  <desc id="desc">The operator workstation builds and runs the accepted local Docker proof. A separate GCP P7 deployment shape contains the Valheim server and Lumberjacks services but remains terminated for this acceptance. The lower section maps technology layers.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#14152b"/>
    </linearGradient>
    <linearGradient id="host" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e7490"/><stop offset="1" stop-color="#155e75"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b21b6"/><stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#000" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#67e8f9"/>
    </marker>
    <marker id="arrow2dash" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#a78bfa"/>
    </marker>
    <style>
      .t { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .sub { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .zone { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; letter-spacing: 1px; }
      .h { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .b { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
      .s { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #a5b4fc; }
      .chip { font: 700 11px 'Segoe UI', Arial, sans-serif; letter-spacing: .8px; text-anchor: middle; }
      .flow { fill: none; stroke: #67e8f9; stroke-width: 3; marker-end: url(#arrow2); }
      .flow-dash { fill: none; stroke: #a78bfa; stroke-width: 3; stroke-dasharray: 10 8; marker-end: url(#arrow2dash); }
    </style>
  </defs>
  <rect width="1600" height="1080" fill="url(#bg2)"/>
  <circle cx="1500" cy="30" r="280" fill="#6d28d9" opacity="0.10"/>
  <circle cx="40" cy="1030" r="260" fill="#0891b2" opacity="0.09"/>

  <text x="52" y="58" class="t">Hardware topology + technology stack</text>
  <text x="52" y="88" class="sub">Solid cyan = accepted local runtime • dashed violet = deployment/operations path not exercised by the accepted window</text>

  <!-- operator host -->
  <g filter="url(#shadow2)">
    <rect x="50" y="135" width="400" height="570" rx="24" fill="#0a2634" stroke="#0891b2" stroke-width="2"/>
    <text x="78" y="177" class="zone">OMEN OPERATOR WORKSTATION</text>
    <rect x="78" y="200" width="344" height="105" rx="15" fill="url(#host)" stroke="#22d3ee"/>
    <text x="102" y="232" class="h">Windows host + RTX 5070</text>
    <text x="102" y="257" class="b">operator console • native rendered Valheim</text>
    <text x="102" y="280" class="s">filesystem authority for C:\work\comfy + Lumberjacks</text>

    <rect x="78" y="330" width="344" height="105" rx="15" fill="#164e63" stroke="#22d3ee"/>
    <text x="102" y="362" class="h">Build and orchestration tools</text>
    <text x="102" y="387" class="b">PowerShell 5.1 • Git • Docker CLI</text>
    <text x="102" y="410" class="b">.NET SDK • Python 3.12 • Node.js</text>

    <rect x="78" y="460" width="344" height="96" rx="15" fill="#103446" stroke="#38bdf8"/>
    <text x="102" y="492" class="h">Artifact build inputs</text>
    <text x="102" y="517" class="b">Valheim managed assemblies • BepInEx core</text>
    <text x="102" y="540" class="b">Comfy + Lumberjacks source commits</text>

    <rect x="78" y="581" width="344" height="94" rx="15" fill="#30204c" stroke="#a78bfa"/>
    <text x="102" y="613" class="h">Operator-only external actions</text>
    <text x="102" y="638" class="b">Terraform • gcloud/IAP SSH • promotion drill</text>
    <text x="102" y="660" class="s">never automatic in the accepted local harness</text>
  </g>

  <!-- local docker proof -->
  <g filter="url(#shadow2)">
    <rect x="500" y="135" width="520" height="570" rx="24" fill="#0c2430" stroke="#14b8a6" stroke-width="2"/>
    <text x="528" y="177" class="zone">LOCAL DOCKER PROOF • ACCEPTED</text>
    <rect x="852" y="151" width="138" height="30" rx="15" fill="#064e3b" stroke="#34d399"/>
    <text x="921" y="171" class="chip" fill="#a7f3d0">RUNTIME PASS</text>

    <rect x="528" y="200" width="464" height="58" rx="14" fill="#12333c" stroke="#2dd4bf"/>
    <text x="550" y="226" class="h">Docker Desktop Linux VM + private bridge network</text>
    <text x="550" y="247" class="s">internal integration only; not the public UDP server topology</text>

    <rect x="528" y="286" width="210" height="138" rx="15" fill="#115e59" stroke="#5eead4"/>
    <text x="550" y="318" class="h">Valheim server</text>
    <text x="550" y="344" class="b">Linux container</text>
    <text x="550" y="367" class="b">BepInEx + Harmony</text>
    <text x="550" y="390" class="b">Comfy DLL / real world</text>
    <text x="550" y="412" class="s">Steam UDP 2456–2457</text>

    <rect x="766" y="286" width="226" height="138" rx="15" fill="#4c1d95" stroke="#c4b5fd"/>
    <text x="788" y="318" class="h">Gateway</text>
    <text x="788" y="344" class="b">ASP.NET Core / .NET 9</text>
    <text x="788" y="367" class="b">HTTP :4000 • schema 2</text>
    <text x="788" y="390" class="b">redirect.wal on run state</text>
    <text x="788" y="412" class="s">artifact-baked release gate</text>

    <rect x="528" y="455" width="464" height="142" rx="15" fill="#075985" stroke="#7dd3fc"/>
    <text x="550" y="487" class="h">Real headless Valheim client / authoritative consumer</text>
    <text x="550" y="513" class="b">josh5/steam-headless:debian • Steam + PlayFab login</text>
    <text x="550" y="536" class="b">BepInEx wrapper • Comfy consumer • RPC_ZDOData</text>
    <text x="550" y="559" class="b">X11 dummy display + xdotool only for the real password dialog</text>
    <text x="550" y="582" class="s">temporary container; removed by harness cleanup</text>

    <rect x="528" y="622" width="464" height="53" rx="14" fill="#172033" stroke="#64748b"/>
    <text x="550" y="645" class="h">Persistent lab inputs are bind-mounted, backed up, then restored</text>
    <text x="550" y="664" class="s">generated run evidence remains; temporary containers do not</text>
  </g>

  <!-- GCP P7 -->
  <g filter="url(#shadow2)">
    <rect x="1070" y="135" width="480" height="570" rx="24" fill="#18152e" stroke="#7c3aed" stroke-width="2"/>
    <text x="1098" y="177" class="zone">GCP P7 DEPLOYMENT SHAPE</text>
    <rect x="1377" y="151" width="143" height="30" rx="15" fill="#3f1d2e" stroke="#fb7185"/>
    <text x="1448" y="171" class="chip" fill="#fecdd3">TERMINATED</text>

    <rect x="1098" y="200" width="424" height="86" rx="15" fill="url(#cloud)" stroke="#a78bfa"/>
    <text x="1122" y="230" class="h">Compute Engine VM • us-west1-b</text>
    <text x="1122" y="254" class="b">n2-highmem-2 • 16 GiB • Ubuntu 24.04 LTS</text>
    <text x="1122" y="276" class="s">systemd → Docker Compose on boot</text>

    <rect x="1098" y="312" width="200" height="144" rx="15" fill="#4c1d95" stroke="#c4b5fd"/>
    <text x="1120" y="343" class="h">Runtime services</text>
    <text x="1120" y="368" class="b">Gateway :4000 / :42317</text>
    <text x="1120" y="391" class="b">EventLog :4002</text>
    <text x="1120" y="414" class="b">Progression :4003</text>
    <text x="1120" y="437" class="b">Operator API :4004</text>

    <rect x="1322" y="312" width="200" height="144" rx="15" fill="#115e59" stroke="#5eead4"/>
    <text x="1344" y="343" class="h">Game + edge</text>
    <text x="1344" y="368" class="b">Valheim server UDP</text>
    <text x="1344" y="391" class="b">optional Caddy TLS profile</text>
    <text x="1344" y="414" class="b">Steam-native join</text>
    <text x="1344" y="437" class="s">TLS not part of acceptance</text>

    <path d="M1098 505 h424 v100 q0 18 -18 18 h-388 q-18 0 -18 -18 z" fill="#3b2a12" stroke="#fbbf24" stroke-width="2"/>
    <ellipse cx="1310" cy="505" rx="212" ry="18" fill="#5b3b10" stroke="#fbbf24" stroke-width="2"/>
    <text x="1122" y="540" class="h">Persistent state • 150 GB pd-balanced</text>
    <text x="1122" y="566" class="b">Valheim world • PostgreSQL 16 • redirect.wal • enrollment</text>
    <text x="1122" y="590" class="b">daily snapshot policy • 7-day retention</text>
    <text x="1122" y="612" class="s">40 GB boot disk holds OS, Docker layers, build cache</text>

    <rect x="1098" y="645" width="424" height="30" rx="15" fill="#272143" stroke="#8b5cf6"/>
    <text x="1310" y="665" class="chip" fill="#ddd6fe">OPS AGENT → CLOUD LOGGING / MONITORING / TRACE</text>
  </g>

  <!-- connections -->
  <path class="flow" d="M450 380 C475 380,475 380,500 380"/>
  <text x="461" y="364" class="s">build / run / inspect</text>
  <path class="flow-dash" d="M422 628 C790 735,900 735,1098 650"/>
  <text x="660" y="747" class="s">manual Terraform / IAP / deploy / promotion only</text>

  <!-- technology stack -->
  <rect x="50" y="755" width="1500" height="270" rx="24" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <text x="78" y="797" class="zone">TECHNOLOGY LAYERS</text>
  <g filter="url(#shadow2)">
    <rect x="78" y="825" width="335" height="158" rx="16" fill="#0d3030" stroke="#2dd4bf"/>
    <text x="102" y="856" class="h">Game integration</text>
    <text x="102" y="882" class="b">C# • .NET Framework 4.8</text>
    <text x="102" y="905" class="b">BepInEx • Harmony • Unity / Valheim</text>
    <text x="102" y="928" class="b">raw bounded HTTP client • JSON</text>
    <text x="102" y="951" class="b">Steam + PlayFab • RPC_ZDOData</text>
    <text x="102" y="974" class="s">ComfyNetworkSense 0.5.31</text>

    <rect x="438" y="825" width="335" height="158" rx="16" fill="#251744" stroke="#a78bfa"/>
    <text x="462" y="856" class="h">Control and data plane</text>
    <text x="462" y="882" class="b">C# • ASP.NET Core • .NET 9</text>
    <text x="462" y="905" class="b">HTTP/JSON • middleware policy</text>
    <text x="462" y="928" class="b">WAL queue • PostgreSQL 16</text>
    <text x="462" y="951" class="b">OpenTelemetry / Google Ops Agent</text>
    <text x="462" y="974" class="s">Lumberjacks Gateway + services</text>

    <rect x="798" y="825" width="335" height="158" rx="16" fill="#102b46" stroke="#38bdf8"/>
    <text x="822" y="856" class="h">Build, test, and evidence</text>
    <text x="822" y="882" class="b">PowerShell 5.1 • Python 3.12</text>
    <text x="822" y="905" class="b">xUnit • unittest • Node.js</text>
    <text x="822" y="928" class="b">Docker BuildKit • SHA-256 manifests</text>
    <text x="822" y="951" class="b">JSONL traces • curated acceptance packet</text>
    <text x="822" y="974" class="s">local/manual pipeline; no hosted CI workflow</text>

    <rect x="1158" y="825" width="364" height="158" rx="16" fill="#30240f" stroke="#fbbf24"/>
    <text x="1182" y="856" class="h">Infrastructure and lifecycle</text>
    <text x="1182" y="882" class="b">Docker Compose • systemd</text>
    <text x="1182" y="905" class="b">Terraform • Compute Engine • VPC</text>
    <text x="1182" y="928" class="b">persistent disk snapshots • IAP SSH</text>
    <text x="1182" y="951" class="b">optional Caddy TLS • artifact rollback</text>
    <text x="1182" y="974" class="s">external mutations require operator action</text>
  </g>
  <text x="52" y="1053" class="s">Diagram separates the accepted local proof from the dormant production-shaped P7 topology; it does not imply P7 was started or deployed.</text>
</svg>
