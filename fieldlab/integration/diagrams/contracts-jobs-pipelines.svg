<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1240" viewBox="0 0 1800 1240" role="img" aria-labelledby="title desc">
  <title id="title">Comfy and Lumberjacks contracts, jobs, pipelines, and test harnesses</title>
  <desc id="desc">A source-derived operational map of the integration contracts, local build and release pipeline, recurring runtime and infrastructure jobs, and the harnesses that verify the system. Hosted CI is explicitly absent.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#17152b"/>
    </linearGradient>
    <linearGradient id="cyan3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e7490"/><stop offset="1" stop-color="#155e75"/>
    </linearGradient>
    <linearGradient id="violet3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d28d9"/><stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="amber3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#92400e"/><stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#67e8f9"/>
    </marker>
    <marker id="arrowGold3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#fbbf24"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .section { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; letter-spacing: 1.1px; }
      .box-title { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .body { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
      .small { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #a5b4fc; }
      .tag { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #fde68a; letter-spacing: .7px; }
      .mono { font: 400 12px Consolas, 'Courier New', monospace; fill: #bae6fd; }
      .flow { fill: none; stroke: #67e8f9; stroke-width: 3; marker-end: url(#arrow3); }
      .manual { fill: none; stroke: #fbbf24; stroke-width: 2.5; stroke-dasharray: 9 7; marker-end: url(#arrowGold3); }
    </style>
  </defs>

  <rect width="1800" height="1240" fill="url(#bg3)"/>
  <circle cx="1660" cy="90" r="240" fill="#4c1d95" opacity=".13"/>
  <circle cx="135" cy="1120" r="260" fill="#0891b2" opacity=".09"/>
  <text x="50" y="58" class="title">Contracts, jobs, pipelines &amp; verification</text>
  <text x="50" y="86" class="subtitle">What crosses each boundary, what runs repeatedly, and what proves the integrated system</text>
  <g transform="translate(1450 42)">
    <rect width="300" height="52" rx="15" fill="#3b2a12" stroke="#fbbf24" stroke-width="2"/>
    <text x="150" y="23" text-anchor="middle" class="tag">LOCAL / OPERATOR-DRIVEN</text>
    <text x="150" y="41" text-anchor="middle" class="small">no hosted CI workflow in either repo</text>
  </g>

  <!-- data contracts -->
  <rect x="40" y="120" width="550" height="700" rx="24" fill="#0b1220" stroke="#0e7490" stroke-width="2"/>
  <text x="68" y="157" class="section">DATA CONTRACTS</text>

  <g filter="url(#shadow3)">
    <rect x="68" y="182" width="494" height="104" rx="16" fill="url(#cyan3)"/>
    <text x="90" y="211" class="box-title">1 · Artifact identity contract</text>
    <text x="90" y="237" class="mono">DLL: LumberjacksModReleaseId</text>
    <text x="90" y="258" class="mono">image: LumberjacksExpectedModRelease</text>
    <text x="90" y="278" class="small">Hashes + metadata are verified from built artifacts, never HEAD.</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="68" y="305" width="494" height="158" rx="16" fill="#0f2f32" stroke="#2dd4bf"/>
    <text x="90" y="334" class="box-title">2 · Producer submission · schema 2</text>
    <text x="90" y="357" class="mono">POST /valheim/zdo-redirect/receipts</text>
    <text x="90" y="381" class="body">Batch: schema_version · source_instance · mod_release</text>
    <text x="90" y="402" class="body">operation · window_id</text>
    <text x="90" y="423" class="body">Item: correlation_id · created_utc · recipient</text>
    <text x="90" y="444" class="body">importance_class · idempotency_key · ZDO payload</text>
    <text x="90" y="458" class="small">caller_identity is authenticated transport metadata, not duplicated JSON.</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="68" y="482" width="494" height="112" rx="16" fill="#251643" stroke="#a78bfa"/>
    <text x="90" y="511" class="box-title">3 · Consumer delivery · schema 1</text>
    <text x="90" y="535" class="body">Authenticated pending-item poll, recipient-scoped.</text>
    <text x="90" y="557" class="body">Gateway envelope carries correlation + original ZDO work.</text>
    <text x="90" y="579" class="small">Schema 1 is the existing delivery contract; schema 2 is ingress.</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="68" y="613" width="494" height="88" rx="16" fill="#0b2c45" stroke="#38bdf8"/>
    <text x="90" y="642" class="box-title">4 · Result contract</text>
    <text x="90" y="665" class="body">ACK array + consumer heartbeat + correlated telemetry</text>
    <text x="90" y="686" class="small">Apply/readback outcome remains attributable to correlation_id.</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="68" y="720" width="494" height="74" rx="16" fill="#3b2a12" stroke="#fbbf24"/>
    <text x="90" y="748" class="box-title">5 · Durable evidence contract</text>
    <text x="90" y="771" class="body">WAL/pending queue · manifest/index · JSONL · verifier verdict</text>
  </g>

  <!-- pipeline -->
  <rect x="615" y="120" width="700" height="700" rx="24" fill="#0b1220" stroke="#7c3aed" stroke-width="2"/>
  <text x="643" y="157" class="section">LOCAL BUILD → RELEASE → PROOF PIPELINE</text>
  <text x="1178" y="157" class="tag">SOLID = AUTOMATED STEP</text>
  <text x="1144" y="176" class="tag">DASHED = OPERATOR GATE</text>

  <g filter="url(#shadow3)">
    <rect x="650" y="190" width="270" height="78" rx="16" fill="url(#violet3)"/>
    <text x="785" y="220" text-anchor="middle" class="box-title">Source + explicit release</text>
    <text x="785" y="244" text-anchor="middle" class="small">Comfy + Lumberjacks commits</text>
  </g>
  <g filter="url(#shadow3)">
    <rect x="1010" y="190" width="270" height="78" rx="16" fill="#251643" stroke="#a78bfa"/>
    <text x="1145" y="220" text-anchor="middle" class="box-title">Contract test suites</text>
    <text x="1145" y="244" text-anchor="middle" class="small">Comfy C# · Python · Gateway xUnit</text>
  </g>
  <path class="flow" d="M920 229 L1010 229"/>

  <g filter="url(#shadow3)">
    <rect x="650" y="311" width="270" height="88" rx="16" fill="#0f2f32" stroke="#2dd4bf"/>
    <text x="785" y="341" text-anchor="middle" class="box-title">Build exact artifacts</text>
    <text x="785" y="365" text-anchor="middle" class="small">Comfy Release DLL + Gateway image</text>
    <text x="785" y="384" text-anchor="middle" class="small">same expected mod release</text>
  </g>
  <path class="flow" d="M1145 268 C1145 290,785 286,785 311"/>

  <g filter="url(#shadow3)">
    <rect x="1010" y="311" width="270" height="88" rx="16" fill="#0b2c45" stroke="#38bdf8"/>
    <text x="1145" y="341" text-anchor="middle" class="box-title">Verify artifact truth</text>
    <text x="1145" y="365" text-anchor="middle" class="small">metadata · DLL SHA-256 · image ID</text>
    <text x="1145" y="384" text-anchor="middle" class="small">effective schema/config view</text>
  </g>
  <path class="flow" d="M920 355 L1010 355"/>

  <g filter="url(#shadow3)">
    <rect x="650" y="445" width="270" height="92" rx="16" fill="#0f2f32" stroke="#2dd4bf"/>
    <text x="785" y="476" text-anchor="middle" class="box-title">Run real local slice</text>
    <text x="785" y="500" text-anchor="middle" class="small">server-originated candidate → Gateway</text>
    <text x="785" y="520" text-anchor="middle" class="small">consumer apply → ACK + telemetry</text>
  </g>
  <path class="flow" d="M1145 399 C1145 425,785 419,785 445"/>

  <g filter="url(#shadow3)">
    <rect x="1010" y="445" width="270" height="92" rx="16" fill="#3b2a12" stroke="#fbbf24"/>
    <text x="1145" y="476" text-anchor="middle" class="box-title">Assert correlated sequence</text>
    <text x="1145" y="500" text-anchor="middle" class="small">positive reaches RPC_ZDOData</text>
    <text x="1145" y="520" text-anchor="middle" class="small">Importance reject never crosses HTTP</text>
  </g>
  <path class="flow" d="M920 491 L1010 491"/>

  <g filter="url(#shadow3)">
    <rect x="650" y="586" width="270" height="86" rx="16" fill="#251643" stroke="#a78bfa"/>
    <text x="785" y="617" text-anchor="middle" class="box-title">Seal evidence package</text>
    <text x="785" y="641" text-anchor="middle" class="small">acceptance report · logs · hashes</text>
    <text x="785" y="659" text-anchor="middle" class="small">release bundle validation</text>
  </g>
  <path class="flow" d="M1145 537 C1145 561,785 559,785 586"/>

  <g filter="url(#shadow3)">
    <rect x="1010" y="586" width="270" height="86" rx="16" fill="url(#amber3)"/>
    <text x="1145" y="617" text-anchor="middle" class="box-title">Manual deployment gate</text>
    <text x="1145" y="641" text-anchor="middle" class="small">operator deploy/promote/restart only</text>
    <text x="1145" y="659" text-anchor="middle" class="small">rollback remains explicit</text>
  </g>
  <path class="manual" d="M920 629 L1010 629"/>

  <g>
    <rect x="650" y="713" width="630" height="78" rx="16" fill="#111827" stroke="#475569"/>
    <text x="675" y="742" class="box-title">Cross-repository audit gate</text>
    <text x="675" y="764" class="body">Comfy fieldlab/network/P7 commit → one public roadmap note</text>
    <text x="675" y="783" class="body">staged roadmap check → Lumberjacks audit commit</text>
  </g>

  <!-- recurring jobs -->
  <rect x="1340" y="120" width="420" height="700" rx="24" fill="#0b1220" stroke="#d97706" stroke-width="2"/>
  <text x="1368" y="157" class="section">RECURRING JOBS &amp; SERVICES</text>

  <g>
    <rect x="1368" y="184" width="364" height="82" rx="15" fill="#3b2a12" stroke="#fbbf24"/>
    <text x="1390" y="213" class="box-title">GCP persistent-disk snapshot</text>
    <text x="1390" y="237" class="body">Daily at 10:00 · retain 7 days</text>
    <text x="1390" y="255" class="small">Terraform-managed production shape</text>
  </g>
  <g>
    <rect x="1368" y="283" width="364" height="82" rx="15" fill="#251643" stroke="#a78bfa"/>
    <text x="1390" y="312" class="box-title">systemd + Docker lifecycle</text>
    <text x="1390" y="336" class="body">boot compose up/down · restart unless-stopped</text>
    <text x="1390" y="354" class="small">P7 is terminated in current acceptance state</text>
  </g>
  <g>
    <rect x="1368" y="382" width="364" height="82" rx="15" fill="#0f2f32" stroke="#2dd4bf"/>
    <text x="1390" y="411" class="box-title">Comfy runtime loops</text>
    <text x="1390" y="435" class="body">consumer poll · apply/ACK · heartbeat</text>
    <text x="1390" y="453" class="small">Runs inside the authoritative mod process</text>
  </g>
  <g>
    <rect x="1368" y="481" width="364" height="82" rx="15" fill="#0b2c45" stroke="#38bdf8"/>
    <text x="1390" y="510" class="box-title">Gateway hosted services</text>
    <text x="1390" y="534" class="body">simulation TickLoop · UDP transport worker</text>
    <text x="1390" y="552" class="small">BackgroundService + PeriodicTimer</text>
  </g>
  <g>
    <rect x="1368" y="580" width="364" height="82" rx="15" fill="#0b2c45" stroke="#38bdf8"/>
    <text x="1390" y="609" class="box-title">Observability export</text>
    <text x="1390" y="633" class="body">OpenTelemetry metrics every 10 seconds</text>
    <text x="1390" y="651" class="small">Gateway and service health remain observable</text>
  </g>
  <g>
    <rect x="1368" y="679" width="364" height="112" rx="15" fill="#111827" stroke="#64748b"/>
    <text x="1390" y="708" class="box-title">Explicit non-jobs</text>
    <text x="1390" y="732" class="body">No hosted CI scheduler.</text>
    <text x="1390" y="753" class="body">No DNS updater cron; address is static.</text>
    <text x="1390" y="774" class="small">Operator actions are not misrepresented as automation.</text>
  </g>

  <!-- harnesses -->
  <rect x="40" y="850" width="1720" height="330" rx="24" fill="#0b1220" stroke="#475569" stroke-width="2"/>
  <text x="68" y="888" class="section">VERIFICATION &amp; TEST HARNESSES</text>
  <text x="68" y="912" class="subtitle">Each harness owns a different boundary; only the real integration harness asserts the full correlated runtime sequence.</text>

  <g filter="url(#shadow3)">
    <rect x="68" y="940" width="300" height="190" rx="18" fill="#251643" stroke="#a78bfa"/>
    <text x="90" y="971" class="box-title">Unit + contract suites</text>
    <text x="90" y="998" class="body">Comfy C# contract tests</text>
    <text x="90" y="1021" class="body">Comfy Python unittest discovery</text>
    <text x="90" y="1044" class="body">Lumberjacks Gateway xUnit</text>
    <text x="90" y="1081" class="small">Fast schema, policy, parser, and</text>
    <text x="90" y="1100" class="small">repository-invariant feedback.</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="392" y="940" width="300" height="190" rx="18" fill="#0f2f32" stroke="#2dd4bf"/>
    <text x="414" y="971" class="box-title">Guest package fault matrix</text>
    <text x="414" y="998" class="body">Deterministic generator</text>
    <text x="414" y="1021" class="body">install/preflight/uninstall invariants</text>
    <text x="414" y="1044" class="body">redaction self-check + guide drift</text>
    <text x="414" y="1081" class="small">Synthetic fixture Gateway; it does not</text>
    <text x="414" y="1100" class="small">claim live enrollment proof.</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="716" y="940" width="300" height="190" rx="18" fill="#0b2c45" stroke="#38bdf8"/>
    <text x="738" y="971" class="box-title">FieldLab scenarios</text>
    <text x="738" y="998" class="body">autonomous Valheim lab</text>
    <text x="738" y="1021" class="body">loopback/redirect/injection windows</text>
    <text x="738" y="1044" class="body">netcode probes + packet validation</text>
    <text x="738" y="1081" class="small">Exercises real game processes and</text>
    <text x="738" y="1100" class="small">scenario-specific runtime boundaries.</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="1040" y="940" width="300" height="190" rx="18" fill="url(#cyan3)"/>
    <text x="1062" y="971" class="box-title">Real integration proof</text>
    <text x="1062" y="998" class="body">Invoke-ComfyLumberjacksIntegration</text>
    <text x="1062" y="1021" class="body">real server + isolated Gateway + client</text>
    <text x="1062" y="1044" class="body">correlated positive + rejected path</text>
    <text x="1062" y="1081" class="small">Nonzero unless the ordered runtime</text>
    <text x="1062" y="1100" class="small">evidence is present; restores its state.</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="1364" y="940" width="368" height="190" rx="18" fill="#3b2a12" stroke="#fbbf24"/>
    <text x="1386" y="971" class="box-title">Release + operations drills</text>
    <text x="1386" y="998" class="body">bundle/index validation · identity checks</text>
    <text x="1386" y="1021" class="body">Gateway regression · promotion drill</text>
    <text x="1386" y="1044" class="body">load tests · deploy/rollback scripts</text>
    <text x="1386" y="1081" class="small">External mutation remains an explicit</text>
    <text x="1386" y="1100" class="small">operator gate, never an implicit test step.</text>
  </g>

  <text x="50" y="1210" class="small">Scope: repository-owned contracts and processes as of the accepted local integration slice · secret values and private endpoints intentionally omitted</text>
</svg>
