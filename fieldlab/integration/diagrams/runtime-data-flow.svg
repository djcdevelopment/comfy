<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1020" viewBox="0 0 1600 1020" role="img" aria-labelledby="title desc">
  <title id="title">Comfy to Lumberjacks runtime data-flow diagram</title>
  <desc id="desc">A real Valheim ZDO candidate is classified by Comfy before HTTP, authenticated and release-admitted by Lumberjacks, routed to the legacy queue, applied by the authoritative consumer through RPC_ZDOData, acknowledged, and exposed through correlated telemetry. Rejected Importance work remains native.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#11182b"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0369a1"/>
      <stop offset="1" stop-color="#075985"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#67e8f9"/>
    </marker>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#fb7185"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .panel-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; letter-spacing: 1.2px; }
      .box-title { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .body { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
      .small { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #a5b4fc; }
      .flow { fill: none; stroke: #67e8f9; stroke-width: 3; marker-end: url(#arrow); }
      .flow-gold { fill: none; stroke: #fbbf24; stroke-width: 3; marker-end: url(#arrowGold); }
      .flow-red { fill: none; stroke: #fb7185; stroke-width: 3; marker-end: url(#arrowRed); }
      .flow-dash { fill: none; stroke: #67e8f9; stroke-width: 2.5; stroke-dasharray: 9 7; marker-end: url(#arrow); }
      .step { fill: #0b1220; stroke: #67e8f9; stroke-width: 2; }
      .step-text { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #cffafe; text-anchor: middle; dominant-baseline: middle; }
      .tag { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #fde68a; letter-spacing: .8px; }
    </style>
  </defs>

  <rect width="1600" height="1020" fill="url(#bg)"/>
  <circle cx="1420" cy="80" r="260" fill="#4c1d95" opacity="0.13"/>
  <circle cx="150" cy="960" r="260" fill="#0f766e" opacity="0.10"/>

  <text x="54" y="58" class="title">Runtime DFD — the accepted vertical slice</text>
  <text x="54" y="88" class="subtitle">Actual ordering: Importance is a producer-side network gate; rejected work never reaches HTTP.</text>
  <g transform="translate(1110,48)">
    <rect width="430" height="48" rx="24" fill="#0b1220" stroke="#334155"/>
    <circle cx="24" cy="24" r="6" fill="#67e8f9"/><text x="38" y="29" class="small">data/control</text>
    <circle cx="144" cy="24" r="6" fill="#fbbf24"/><text x="158" y="29" class="small">durable state</text>
    <circle cx="274" cy="24" r="6" fill="#fb7185"/><text x="288" y="29" class="small">negative/native</text>
  </g>

  <!-- zone panels -->
  <rect x="45" y="130" width="440" height="680" rx="22" fill="#0b2130" stroke="#155e75" stroke-width="2" opacity="0.92"/>
  <rect x="570" y="130" width="470" height="680" rx="22" fill="#19152f" stroke="#6d28d9" stroke-width="2" opacity="0.94"/>
  <rect x="1120" y="130" width="435" height="680" rx="22" fill="#0b2033" stroke="#0369a1" stroke-width="2" opacity="0.94"/>
  <text x="70" y="168" class="panel-title">COMFY PRODUCER • DEDICATED SERVER</text>
  <text x="595" y="168" class="panel-title">LUMBERJACKS GATEWAY • EXISTING INGRESS</text>
  <text x="1145" y="168" class="panel-title">COMFY AUTHORITATIVE CONSUMER</text>

  <!-- producer -->
  <g filter="url(#shadow)">
    <rect x="80" y="195" width="370" height="82" rx="14" fill="#164e63" stroke="#22d3ee"/>
    <text x="102" y="225" class="box-title">Dedicated Valheim server</text>
    <text x="102" y="249" class="body">real world • native peer • post-sort toSync</text>
    <text x="102" y="268" class="small">Valheim / Unity / Steam networking</text>

    <rect x="80" y="318" width="370" height="84" rx="14" fill="url(#teal)" stroke="#2dd4bf"/>
    <text x="102" y="348" class="box-title">CreateSyncListPostfix</text>
    <text x="102" y="372" class="body">observes a real post-ServerSortSendZDOS candidate</text>
    <text x="102" y="391" class="small">ZdoRedirectPatches → ZdoRedirectRunner.Process</text>

    <rect x="80" y="445" width="370" height="100" rx="14" fill="url(#teal)" stroke="#2dd4bf"/>
    <text x="102" y="476" class="box-title">Importance classification + final gate</text>
    <text x="102" y="501" class="body">rank ≤ configured maximum → network eligible</text>
    <text x="102" y="523" class="body">rank &gt; maximum → leave in native toSync</text>

    <rect x="80" y="593" width="370" height="92" rx="14" fill="#0f766e" stroke="#5eead4"/>
    <text x="102" y="623" class="box-title">Schema-2 batch envelope</text>
    <text x="102" y="647" class="body">release • source • operation • window</text>
    <text x="102" y="668" class="body">correlation • recipient • Importance • ZDO bytes</text>

    <rect x="80" y="718" width="370" height="64" rx="14" fill="#321827" stroke="#fb7185"/>
    <text x="102" y="746" class="box-title">Native Valheim send path</text>
    <text x="102" y="768" class="body">negative path: no Gateway or consumer observation</text>
  </g>

  <!-- gateway -->
  <g filter="url(#shadow)">
    <rect x="610" y="195" width="390" height="76" rx="14" fill="url(#violet)" stroke="#a78bfa"/>
    <text x="634" y="225" class="box-title">HTTP receipt ingress</text>
    <text x="634" y="249" class="body">POST /valheim/zdo-redirect/receipts</text>

    <rect x="610" y="305" width="390" height="76" rx="14" fill="url(#violet)" stroke="#a78bfa"/>
    <text x="634" y="335" class="box-title">Authentication / caller resolution</text>
    <text x="634" y="359" class="body">network principal → private-plane • Producer</text>

    <rect x="610" y="415" width="390" height="86" rx="14" fill="url(#violet)" stroke="#c4b5fd"/>
    <text x="634" y="445" class="box-title">Schema + release admission</text>
    <text x="634" y="469" class="body">schema 2 requires artifact-baked expected release</text>
    <text x="634" y="489" class="small">wrong release → HTTP 409 before delivery</text>

    <rect x="610" y="535" width="390" height="96" rx="14" fill="#4c1d95" stroke="#c4b5fd"/>
    <text x="634" y="565" class="box-title">Recipient resolution + sequencing</text>
    <text x="634" y="589" class="body">recipient legacy • per-window sequence</text>
    <text x="634" y="611" class="body">pending / acknowledged conservation</text>

    <path d="M650 675 h310 v62 q0 18 -18 18 h-274 q-18 0 -18 -18 z" fill="#3b2a12" stroke="#fbbf24" stroke-width="2"/>
    <ellipse cx="805" cy="675" rx="155" ry="17" fill="#5b3b10" stroke="#fbbf24" stroke-width="2"/>
    <text x="682" y="707" class="box-title">redirect.wal + queue state</text>
    <text x="682" y="731" class="body">durable receipts • pending • ACK state</text>
  </g>

  <!-- consumer -->
  <g filter="url(#shadow)">
    <rect x="1155" y="195" width="365" height="78" rx="14" fill="url(#blue)" stroke="#38bdf8"/>
    <text x="1178" y="225" class="box-title">Recipient-scoped poll</text>
    <text x="1178" y="249" class="body">GET pending/{window}?limit=1024</text>

    <rect x="1155" y="315" width="365" height="94" rx="14" fill="url(#blue)" stroke="#38bdf8"/>
    <text x="1178" y="345" class="box-title">Authoritative consumer runner</text>
    <text x="1178" y="369" class="body">decode body • main-thread apply budget</text>
    <text x="1178" y="391" class="body">preserve correlation + priority metadata</text>

    <rect x="1155" y="451" width="365" height="92" rx="14" fill="#075985" stroke="#7dd3fc"/>
    <text x="1178" y="482" class="box-title">ZDOMan.RPC_ZDOData</text>
    <text x="1178" y="506" class="body">real Valheim receive funnel</text>
    <text x="1178" y="528" class="body">readback → applied or safely superseded</text>

    <rect x="1155" y="585" width="365" height="106" rx="14" fill="#0c4a6e" stroke="#7dd3fc"/>
    <text x="1178" y="615" class="box-title">ACK + correlated telemetry</text>
    <text x="1178" y="639" class="body">POST ack/{window} [sequence...]</text>
    <text x="1178" y="661" class="body">first/last correlation • result • counters</text>
    <text x="1178" y="682" class="small">Gateway status + consumer status surfaces</text>
  </g>

  <!-- numbered flows -->
  <path class="flow" d="M265 277 L265 318"/>
  <circle class="step" cx="286" cy="299" r="14"/><text class="step-text" x="286" y="299">1</text>
  <path class="flow" d="M265 402 L265 445"/>
  <circle class="step" cx="286" cy="424" r="14"/><text class="step-text" x="286" y="424">2</text>
  <path class="flow" d="M265 545 L265 593"/>
  <circle class="step" cx="286" cy="569" r="14"/><text class="step-text" x="286" y="569">3</text>
  <path class="flow-red" d="M105 545 C55 580,55 680,105 718"/>
  <text x="54" y="642" class="tag">REJECT</text>
  <path class="flow" d="M450 639 C530 639,530 233,610 233"/>
  <circle class="step" cx="530" cy="437" r="14"/><text class="step-text" x="530" y="437">4</text>
  <text x="490" y="420" class="tag">HTTP</text>
  <path class="flow" d="M805 271 L805 305"/>
  <circle class="step" cx="826" cy="288" r="14"/><text class="step-text" x="826" y="288">5</text>
  <path class="flow" d="M805 381 L805 415"/>
  <circle class="step" cx="826" cy="398" r="14"/><text class="step-text" x="826" y="398">6</text>
  <path class="flow" d="M805 501 L805 535"/>
  <circle class="step" cx="826" cy="518" r="14"/><text class="step-text" x="826" y="518">7</text>
  <path class="flow-gold" d="M805 631 L805 658"/>
  <path class="flow" d="M960 699 C1080 699,1060 234,1155 234"/>
  <circle class="step" cx="1083" cy="455" r="14"/><text class="step-text" x="1083" y="455">8</text>
  <path class="flow" d="M1338 273 L1338 315"/>
  <path class="flow" d="M1338 409 L1338 451"/>
  <circle class="step" cx="1359" cy="430" r="14"/><text class="step-text" x="1359" y="430">9</text>
  <path class="flow" d="M1338 543 L1338 585"/>
  <path class="flow-dash" d="M1155 638 C1080 638,1080 763,960 763"/>
  <circle class="step" cx="1081" cy="716" r="14"/><text class="step-text" x="1081" y="716">10</text>

  <!-- evidence plane -->
  <rect x="45" y="845" width="1510" height="130" rx="22" fill="#111827" stroke="#475569" stroke-width="2"/>
  <text x="70" y="880" class="panel-title">OBSERVABILITY + ACCEPTANCE PLANE</text>
  <g>
    <rect x="70" y="900" width="330" height="50" rx="12" fill="#0f2f32" stroke="#2dd4bf"/>
    <text x="90" y="922" class="box-title">Producer JSONL</text><text x="90" y="942" class="small">candidate → allow/reject → redirect</text>
    <rect x="430" y="900" width="330" height="50" rx="12" fill="#261746" stroke="#a78bfa"/>
    <text x="450" y="922" class="box-title">Gateway logs + status</text><text x="450" y="942" class="small">caller • release • recipient • conservation</text>
    <rect x="790" y="900" width="330" height="50" rx="12" fill="#0b2c45" stroke="#38bdf8"/>
    <text x="810" y="922" class="box-title">Consumer logs + heartbeat</text><text x="810" y="942" class="small">correlation • apply result • ACK counters</text>
    <rect x="1150" y="900" width="370" height="50" rx="12" fill="#3b2a12" stroke="#fbbf24"/>
    <text x="1170" y="922" class="box-title">Verifier + curated evidence</text><text x="1170" y="942" class="small">positive sequence + network-absent negative</text>
  </g>
  <path class="flow-dash" d="M265 782 L265 900"/>
  <path class="flow-dash" d="M805 755 L805 875 L595 875 L595 900"/>
  <path class="flow-dash" d="M1338 691 L1338 875 L955 875 L955 900"/>

  <text x="50" y="1000" class="small">Scope: accepted local schema-2 slice • release m4-integration-20260719-r1 • P7 deployment remains outside this proof</text>
</svg>
